name: Build and Deploy to Aliyun

on:
  push:
    branches:
      - main  # 监听 main 分支的 push 操作

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 根据您的环境可修改版本号
          cache: 'npm'

      # 3. 安装依赖和构建产物
      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      # 4. 自动化通过 SCP 部署到阿里云服务器
      - name: Deploy to Aliyun
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # 如果您是用 SSH 密钥登录的服务器，请注释掉上一行的 password，并取消下一行的注释使用 key
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22 # 服务器 SSH 默认端口
          source: "dist/"
          target: "/home/admin/mc-web/www"
          strip_components: 1 # 去掉外层的 dist/ 文件夹，只拷贝里面的文件内容到 target 目录下
